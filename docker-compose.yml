version: "3.9"
services:
  app:
    environment:
      - TZ=Europe/Moscow
    build: .
    expose:
      - "8080"
    networks:
      - web
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web
networks:
  web:
volumes:
  caddy_data:
  caddy_config:
